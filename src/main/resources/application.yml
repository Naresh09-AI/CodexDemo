spring:
  application:
    name: user-management-system
  datasource:
    url: jdbc:h2:mem:user_management_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

application:
  cors:
    allowed-origins: http://localhost:4200
  admin:
    users:
      - first-name: Admin
        last-name: User
        email: admin@example.com
        password: AdminPass123!
        phone: "5550000000"
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key-for-local-development-only}
      expiration-minutes: 60
